# blue-tanuki example policy
# Loaded by load_policy() -> PolicyGate.
# Matcher keys allowed in `when`:
#   direction, caller, module, op,
#   resource_match (regex), content_match (regex),
#   model_match (regex), finish_reason,
#   side_effect_bytes_out_gt, payload_size_gt
# Action values: pass | stop | suspend_approval | suspend_clarify
# Composition: severity stop > suspend_approval > suspend_clarify > pass.
# Among same severity, first-in-list wins.

version: 1
defaults:
  on_no_match: pass

rules:
  - id: deny_system_path_write
    when:
      direction: pre_module
      module: file_ops
      op: write
      resource_match: '^/(etc|boot|sys|proc)(/|$)'
    action: stop
    reason: 'system path write is not allowed'

  - id: deny_home_ssh_write
    when:
      direction: pre_module
      module: file_ops
      op: write
      resource_match: '/\.ssh(/|$)'
    action: stop
    reason: '.ssh write is not allowed'

  - id: approve_external_fetch
    when:
      direction: pre_module
      module: web_fetch
    action: suspend_approval
    reason: 'external network request requires approval'

  - id: stop_on_large_side_effect
    when:
      direction: post_module
      side_effect_bytes_out_gt: 10485760
    action: stop
    reason: 'side effect exceeds 10 MiB cap'

  - id: clarify_on_empty_input
    when:
      direction: inbound
      content_match: '^\s*$'
    action: suspend_clarify
    clarify_prompt: '何をお手伝いしますか？'

  - id: stop_on_filtered_llm
    when:
      direction: post_llm
      finish_reason: filtered
    action: stop
    reason: 'llm provider filtered the response'
